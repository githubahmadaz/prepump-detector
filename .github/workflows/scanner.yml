name: Pre-Pump Scanner

#on:
  schedule:
   - cron: '0 */1 * * *'   # setiap 2 jam sekali (menit 0)
  workflow_dispatch:

#jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ──────────────────────────────────────────────────────────────
      # [FIX L] PERSISTENT COOLDOWN — restore dari run sebelumnya
      # Tanpa ini: runner baru tiap 30 menit = cooldown.json hilang
      # = koin yang sama di-alert berulang (lihat: IOTX scan #1 & #2)
      # ──────────────────────────────────────────────────────────────
      - name: Restore cooldown cache
        uses: actions/cache@v4
        with:
          path: cooldown.json
          key: scanner-cooldown-${{ github.run_id }}
          restore-keys: |
            scanner-cooldown-

      - name: Install dependencies
        run: pip install ccxt pandas numpy requests

      - name: Run scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      # actions/cache otomatis menyimpan cooldown.json yang baru
      # ke cache setelah job selesai — tidak perlu step tambahan


